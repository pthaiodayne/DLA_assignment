<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 530" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="imgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="encoderGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="featGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f472b6"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="simGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="outGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="arrowGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="arrowGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="arrowGrad3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="arrowGrad4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="arrowGrad5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>

    <filter id="shadow" x="-8%" y="-8%" width="116%" height="124%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowSm" x="-4%" y="-8%" width="108%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>

    <marker id="ah1" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#6366f1"/>
    </marker>
    <marker id="ah2" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#059669"/>
    </marker>
    <marker id="ah3" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#0284c7"/>
    </marker>
    <marker id="ah4" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#db2777"/>
    </marker>
    <marker id="ah5" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#d97706"/>
    </marker>
    <marker id="ah6" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1160" height="530" rx="24" fill="url(#bgGrad)"/>
  <rect width="1160" height="530" rx="24" fill="none" stroke="#c7d2fe" stroke-width="1.5" opacity="0.5"/>

  <!-- Title -->
  <text x="580" y="42" text-anchor="middle" font-size="18" font-weight="800" fill="#1e293b" letter-spacing="0.02em">CLIP Multimodal Classification Pipeline</text>
  <text x="580" y="64" text-anchor="middle" font-size="12" fill="#64748b" letter-spacing="0.04em">Zero-Shot &amp; Few-Shot on Food-101</text>

  <!-- ═══════ IMAGE BRANCH (top) ═══════ -->

  <!-- Input: Food Image -->
  <g filter="url(#shadow)">
    <rect x="30" y="110" width="140" height="100" rx="16" fill="url(#imgGrad)"/>
    <!-- image icon -->
    <rect x="72" y="128" width="56" height="42" rx="6" fill="none" stroke="#fff" stroke-width="2" opacity="0.9"/>
    <circle cx="86" cy="142" r="5" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.8"/>
    <polyline points="72,163 88,151 100,158 112,146 128,163" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.8"/>
    <text x="100" y="192" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Food Image</text>
  </g>

  <!-- Input: Text Prompts -->
  <g filter="url(#shadow)">
    <rect x="30" y="310" width="140" height="100" rx="16" fill="url(#textGrad)"/>
    <!-- text icon -->
    <rect x="68" y="328" width="64" height="44" rx="6" fill="none" stroke="#fff" stroke-width="2" opacity="0.9"/>
    <line x1="78" y1="340" x2="122" y2="340" stroke="#fff" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <line x1="78" y1="350" x2="116" y2="350" stroke="#fff" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <line x1="78" y1="360" x2="108" y2="360" stroke="#fff" stroke-width="2" opacity="0.7" stroke-linecap="round"/>
    <text x="100" y="394" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Text Prompt</text>
  </g>

  <!-- Arrow: Image → Image Encoder -->
  <line x1="170" y1="160" x2="238" y2="160" stroke="#6366f1" stroke-width="2.5" marker-end="url(#ah1)" opacity="0.8"/>

  <!-- Arrow: Text → Text Encoder -->
  <line x1="170" y1="360" x2="238" y2="360" stroke="#059669" stroke-width="2.5" marker-end="url(#ah2)" opacity="0.8"/>

  <!-- CLIP Image Encoder -->
  <g filter="url(#shadow)">
    <rect x="240" y="110" width="180" height="100" rx="16" fill="url(#encoderGrad)"/>
    <!-- ViT icon (grid) -->
    <g opacity="0.85">
      <rect x="280" y="126" width="16" height="16" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
      <rect x="300" y="126" width="16" height="16" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
      <rect x="320" y="126" width="16" height="16" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
      <rect x="340" y="126" width="16" height="16" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
      <rect x="280" y="146" width="16" height="16" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
      <rect x="300" y="146" width="16" height="16" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
      <rect x="320" y="146" width="16" height="16" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
      <rect x="340" y="146" width="16" height="16" rx="2" fill="none" stroke="#fff" stroke-width="1.5"/>
    </g>
    <text x="330" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">CLIP Image</text>
    <text x="330" y="199" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Encoder (ViT)</text>
  </g>

  <!-- CLIP Text Encoder -->
  <g filter="url(#shadow)">
    <rect x="240" y="310" width="180" height="100" rx="16" fill="url(#encoderGrad)"/>
    <!-- transformer icon -->
    <g opacity="0.85">
      <circle cx="300" cy="340" r="8" fill="none" stroke="#fff" stroke-width="1.5"/>
      <circle cx="330" cy="340" r="8" fill="none" stroke="#fff" stroke-width="1.5"/>
      <circle cx="360" cy="340" r="8" fill="none" stroke="#fff" stroke-width="1.5"/>
      <line x1="308" y1="340" x2="322" y2="340" stroke="#fff" stroke-width="1.5"/>
      <line x1="338" y1="340" x2="352" y2="340" stroke="#fff" stroke-width="1.5"/>
      <path d="M296,332 Q300,320 304,332" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
      <path d="M326,332 Q330,320 334,332" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
      <path d="M356,332 Q360,320 364,332" fill="none" stroke="#fff" stroke-width="1.2" opacity="0.6"/>
    </g>
    <text x="330" y="380" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">CLIP Text</text>
    <text x="330" y="395" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Encoder</text>
  </g>

  <!-- Arrow: Img Enc → Image Features -->
  <line x1="420" y1="160" x2="488" y2="160" stroke="#0284c7" stroke-width="2.5" marker-end="url(#ah3)" opacity="0.8"/>

  <!-- Arrow: Txt Enc → Text Features -->
  <line x1="420" y1="360" x2="488" y2="360" stroke="#0284c7" stroke-width="2.5" marker-end="url(#ah3)" opacity="0.8"/>

  <!-- Image Features -->
  <g filter="url(#shadow)">
    <rect x="490" y="120" width="160" height="80" rx="16" fill="url(#featGrad)"/>
    <!-- vector icon -->
    <g opacity="0.85">
      <text x="570" y="152" text-anchor="middle" font-size="18" fill="#fff" font-family="monospace">[  512-d  ]</text>
    </g>
    <text x="570" y="185" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Image Features</text>
  </g>

  <!-- Text Features -->
  <g filter="url(#shadow)">
    <rect x="490" y="320" width="160" height="80" rx="16" fill="url(#featGrad)"/>
    <g opacity="0.85">
      <text x="570" y="352" text-anchor="middle" font-size="18" fill="#fff" font-family="monospace">[  512-d  ]</text>
    </g>
    <text x="570" y="385" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Text Features</text>
  </g>

  <!-- Arrows converging to Similarity -->
  <path d="M650,160 Q700,160 720,220" stroke="#db2777" stroke-width="2.5" fill="none" marker-end="url(#ah4)" opacity="0.8"/>
  <path d="M650,360 Q700,360 720,300" stroke="#db2777" stroke-width="2.5" fill="none" marker-end="url(#ah4)" opacity="0.8"/>

  <!-- Cosine Similarity -->
  <g filter="url(#shadow)">
    <rect x="710" y="215" width="160" height="90" rx="16" fill="url(#simGrad)"/>
    <!-- cosine icon -->
    <text x="790" y="250" text-anchor="middle" font-size="22" font-weight="800" fill="#fff" opacity="0.9">cos(θ)</text>
    <text x="790" y="275" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Cosine Similarity</text>
    <text x="790" y="293" text-anchor="middle" font-size="10" fill="#fff" opacity="0.8">Image · Text / ‖I‖‖T‖</text>
  </g>

  <!-- Arrow: Similarity → Output -->
  <line x1="870" y1="260" x2="938" y2="260" stroke="#d97706" stroke-width="2.5" marker-end="url(#ah6)" opacity="0.8"/>

  <!-- Output: Prediction -->
  <g filter="url(#shadow)">
    <rect x="940" y="200" width="140" height="120" rx="16" fill="url(#outGrad)"/>
    <!-- checkmark icon -->
    <circle cx="1010" cy="238" r="18" fill="none" stroke="#fff" stroke-width="2.5" opacity="0.9"/>
    <polyline points="1000,238 1007,246 1022,230" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <text x="1010" y="278" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">Predicted</text>
    <text x="1010" y="296" text-anchor="middle" font-size="13" font-weight="800" fill="#fff">Class</text>
    <text x="1010" y="313" text-anchor="middle" font-size="10" fill="#fff" opacity="0.85">e.g. "pizza"</text>
  </g>

  <!-- ═══════ BRANCH LABELS ═══════ -->
  <text x="100" y="96" text-anchor="middle" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="0.06em" text-transform="uppercase">VISION</text>
  <text x="100" y="296" text-anchor="middle" font-size="11" font-weight="700" fill="#059669" letter-spacing="0.06em" text-transform="uppercase">LANGUAGE</text>

  <!-- ═══════ BOTTOM: Few-Shot Branch ═══════ -->
  <g opacity="0.85">
    <rect x="490" y="448" width="640" height="60" rx="14" fill="#fff" stroke="#c7d2fe" stroke-width="1.5" filter="url(#shadowSm)"/>
    <text x="516" y="474" font-size="11" font-weight="700" fill="#4f46e5" letter-spacing="0.04em">FEW-SHOT PATH</text>
    <line x1="630" y1="460" x2="630" y2="488" stroke="#e2e8f0" stroke-width="1"/>
    <text x="646" y="474" font-size="11" fill="#475569">Freeze CLIP features → train Linear Probe / MLP head on K-shot labels</text>
    <text x="646" y="494" font-size="10" fill="#94a3b8">K ∈ {1, 2, 4, 8, 16} shots per class · Best: 94.04% @ K=16</text>
  </g>

  <!-- Dashed arrow from features to few-shot box -->
  <line x1="570" y1="400" x2="570" y2="446" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <polygon points="566,444 570,452 574,444" fill="#6366f1" opacity="0.5"/>

  <!-- ═══════ PROMPT ENGINEERING NOTE ═══════ -->
  <g opacity="0.85">
    <rect x="30" y="448" width="430" height="60" rx="14" fill="#ecfdf5" stroke="#a7f3d0" stroke-width="1.5" filter="url(#shadowSm)"/>
    <text x="56" y="474" font-size="11" font-weight="700" fill="#059669" letter-spacing="0.04em">💡 PROMPT ENGINEERING</text>
    <line x1="222" y1="460" x2="222" y2="488" stroke="#d1fae5" stroke-width="1"/>
    <text x="236" y="474" font-size="11" fill="#064e3b">"a delicious {}" → 96.22% acc</text>
    <text x="236" y="494" font-size="10" fill="#065f46">Surpasses few-shot with zero training</text>
  </g>

  <!-- Dashed arrow from text prompt to prompt eng box -->
  <line x1="100" y1="410" x2="100" y2="446" stroke="#059669" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>
  <polygon points="96,444 100,452 104,444" fill="#059669" opacity="0.5"/>
</svg>
